<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Notification Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slide-in-from-right {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toast-progress {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-slide-in-from-right {
            animation: slide-in-from-right 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen p-8">
    <div class="max-w-md mx-auto">
        <h1 class="text-white text-2xl font-bold mb-6">Toast Notification Test</h1>
        <div class="space-y-4">
            <button onclick="showSuccess()" class="w-full bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg">
                Success Toast
            </button>
            <button onclick="showError()" class="w-full bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg">
                Error Toast
            </button>
            <button onclick="showInfo()" class="w-full bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg">
                Info Toast
            </button>
            <button onclick="showWarning()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white px-4 py-2 rounded-lg">
                Warning Toast
            </button>
        </div>
    </div>
    <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 max-w-sm w-full"></div>

    <script>
        let toastId = 0;

        const TYPE_STYLES = {
            success: { bg: 'bg-green-900/95', border: 'border-green-700', icon: '✓', iconColor: 'text-green-400' },
            error: { bg: 'bg-red-900/95', border: 'border-red-700', icon: '✗', iconColor: 'text-red-400' },
            info: { bg: 'bg-blue-900/95', border: 'border-blue-700', icon: 'ℹ', iconColor: 'text-blue-400' },
            warning: { bg: 'bg-yellow-900/95', border: 'border-yellow-700', icon: '⚠', iconColor: 'text-yellow-400' },
        };

        function addToast(type, message, duration = 4000) {
            const id = `toast-${++toastId}`;
            const container = document.getElementById('toast-container');
            const style = TYPE_STYLES[type];

            const toast = document.createElement('div');
            toast.className = 'relative overflow-hidden rounded-lg shadow-xl backdrop-blur-sm animate-slide-in-from-right';
            toast.id = id;
            toast.innerHTML = `
                <div class="${style.bg} ${style.border} border rounded-lg px-4 py-3 flex items-start gap-3">
                    <span class="text-base shrink-0 mt-0.5 ${style.iconColor} font-bold">${style.icon}</span>
                    <p class="text-sm text-white flex-1 leading-relaxed">${message}</p>
                    <button onclick="removeToast('${id}')" class="text-gray-400 hover:text-white text-base shrink-0 ml-2 transition-colors p-0.5 rounded hover:bg-white/10">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div class="absolute bottom-0 left-0 h-0.5 bg-white/20">
                    <div class="h-full bg-white/40" style="animation: toast-progress ${duration}ms linear forwards;"></div>
                </div>
            `;

            container.appendChild(toast);

            setTimeout(() => removeToast(id), duration);
        }

        function removeToast(id) {
            const toast = document.getElementById(id);
            if (toast) {
                toast.remove();
            }
        }

        function showSuccess() {
            addToast('success', 'Project created successfully!');
        }

        function showError() {
            addToast('error', 'Failed to create project. Please try again.', 6000);
        }

        function showInfo() {
            addToast('info', 'Repository scan started...');
        }

        function showWarning() {
            addToast('warning', 'This action cannot be undone.', 5000);
        }
    </script>
</body>
</html>
